<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능 영어 단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EC; --paper-2:#FFFFFF; --ink:#26382F;
    --green:#2E5D4B; --green-soft:#5c8676; --red:#C8402F;
    --hl:#FCE38A; --hl-line:#F2C94C; --muted:#8A8578;
    --line:#E4DFD2; --shadow:0 6px 22px rgba(38,56,47,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased;padding:0 16px 40px;}
  a{color:inherit;}
  header{width:100%;max-width:780px;text-align:center;padding:26px 0 6px;}
  .back{display:inline-block;font-size:12.5px;color:var(--green-soft);text-decoration:none;margin-bottom:10px;}
  .back:hover{color:var(--green);}
  header .kicker{font-size:12px;letter-spacing:2px;color:var(--green-soft);font-weight:700;}
  header h1{font-size:22px;font-weight:900;margin-top:4px;}

  .filters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%;max-width:780px;margin:12px 0 4px;}
  .filters button{font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;
    padding:6px 12px;border-radius:20px;border:1.5px solid var(--line);background:#fff;color:var(--ink);transition:.13s;}
  .filters button:hover{border-color:var(--green-soft);}
  .filters button.on{background:var(--green);border-color:var(--green);color:#fff;}
  .status-filters{margin:2px 0 6px;}
  .status-filters button{font-size:12px;padding:5px 13px;border-radius:16px;}
  .status-filters button.on{background:var(--hl-line);border-color:var(--hl-line);color:#5c4400;}
  .status-filters button.on.todo-on{background:var(--red);border-color:var(--red);color:#fff;}
  .empty-msg{background:#fff;border:1.5px dashed var(--line);border-radius:14px;
    padding:38px 24px;text-align:center;color:var(--muted);font-size:14.5px;line-height:1.8;
    max-width:780px;margin:16px auto;}
  .empty-msg .big{font-size:30px;display:block;margin-bottom:8px;}
  .empty-msg button{margin-top:14px;font-family:inherit;font-size:13px;font-weight:700;
    background:var(--green);color:#fff;border:none;border-radius:18px;padding:9px 18px;cursor:pointer;}

  /* 진도 옮기기 패널 */
  .sync-panel{display:none;width:100%;max-width:780px;background:#fff;border:1.5px solid var(--line);
    border-radius:14px;padding:20px 22px;margin:8px auto 20px;box-shadow:0 2px 12px rgba(38,56,47,.08);}
  .sync-panel h3{font-size:16px;font-weight:900;color:var(--green);margin-bottom:6px;}
  .sync-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
  .sync-desc b{color:var(--ink);}
  .sync-block{margin-bottom:16px;}
  .sync-block label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .sync-block label span{font-weight:500;color:var(--muted);font-size:12px;}
  .sync-panel textarea{width:100%;height:74px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;
    line-height:1.5;color:#4a5a52;background:#f7f9f7;border:1.5px solid var(--line);border-radius:9px;
    padding:9px 11px;resize:vertical;word-break:break-all;}
  .sync-panel textarea:focus{outline:none;border-color:var(--green-soft);}
  .sync-btn{margin-top:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
    background:#fff;color:var(--green);border:1.5px solid var(--green-soft);border-radius:18px;
    padding:8px 16px;transition:.13s;}
  .sync-btn:hover{background:var(--green-soft);color:#fff;}
  .sync-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
  .sync-btn.primary:hover{background:#25493b;}
  .sync-msg{font-size:13px;font-weight:700;color:var(--green);min-height:20px;margin-top:4px;}
  .sync-close{display:block;margin:12px auto 0;font-family:inherit;font-size:12.5px;color:var(--muted);
    background:none;border:none;cursor:pointer;text-decoration:underline;}

  .progress{width:100%;max-width:780px;margin:14px 0 6px;}
  .pbar{height:8px;background:var(--line);border-radius:5px;overflow:hidden;}
  .pbar > span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--hl-line),var(--green-soft));transition:width .35s;}
  .pmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px;}
  .pmeta b{color:var(--green);}

  .card{width:100%;max-width:780px;height:310px;margin:16px 0;perspective:1600px;cursor:pointer;}
  .inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
  .card.flip .inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--paper-2);border-radius:20px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;border-top:6px solid var(--green-soft);}
  .front .sess{position:absolute;top:16px;left:18px;font-size:11px;font-weight:700;color:var(--green-soft);letter-spacing:1px;}
  .front .word{font-size:40px;font-weight:900;color:var(--ink);line-height:1.15;
    white-space:nowrap;max-width:100%;padding:0 6px;}
  .front .ipa{margin-top:8px;font-size:16px;color:var(--green-soft);font-family:'Noto Sans KR',sans-serif;}
  .front .pos{margin-top:8px;font-size:13px;color:var(--muted);font-style:italic;}
  .speak{margin-top:14px;display:inline-flex;align-items:center;gap:6px;
    background:var(--green-soft);color:#fff;border:none;border-radius:20px;
    padding:8px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
    box-shadow:0 2px 8px rgba(46,93,75,.2);transition:.13s;}
  .speak:hover{background:var(--green);transform:translateY(-1px);}
  .speak:active{transform:scale(.96);}
  .speak.playing{background:var(--red);}
  .front .hint{position:absolute;bottom:18px;font-size:12px;color:#c3bdae;}
  .back-face{transform:rotateY(180deg);border-top-color:var(--red);}
  .back-face .word-sm{font-size:15px;color:var(--muted);margin-bottom:4px;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .back-face .word-sm .ipa-sm{color:var(--green-soft);font-size:14px;}
  .back-face .speak-sm{background:none;border:1.5px solid var(--green-soft);color:var(--green-soft);
    border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;display:inline-flex;
    align-items:center;justify-content:center;padding:0;margin-bottom:8px;transition:.13s;}
  .back-face .speak-sm:hover{background:var(--green-soft);color:#fff;}
  .back-face .mean{font-size:23px;font-weight:900;color:var(--green);line-height:1.4;}
  .back-face .ex{margin-top:16px;font-size:15px;color:var(--ink);line-height:1.6;font-family:'Gaegu',cursive;
    background:#fffdf6;border:1px dashed var(--hl-line);border-radius:10px;padding:10px 14px;}
  .back-face .ex .em{background:var(--hl);border-radius:3px;padding:0 3px;font-weight:700;}
  .known-badge{position:absolute;top:16px;right:18px;font-family:'Gaegu',cursive;font-weight:700;
    color:var(--green);border:2.5px solid var(--green);border-radius:8px;padding:0 10px;font-size:16px;transform:rotate(8deg);display:none;}
  .card.is-known .known-badge{display:block;}
  .empty{width:100%;max-width:780px;text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}

  .idx{text-align:center;font-size:13px;color:var(--muted);width:100%;max-width:780px;margin-bottom:14px;}
  .idx b{color:var(--ink);}
  .mark{display:flex;gap:10px;width:100%;max-width:780px;}
  .mark button{flex:1;padding:12px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.13s;}
  .mark .know{color:var(--green);} .mark .know:hover,.mark .know.on{background:var(--hl);border-color:var(--hl-line);}
  .mark .dunno{color:var(--red);} .mark .dunno:hover{background:#fdeae6;border-color:var(--red);}
  .nav{display:flex;gap:10px;width:100%;max-width:780px;margin-top:12px;}
  .btn{flex:1;padding:13px;border:none;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;background:var(--paper-2);color:var(--ink);box-shadow:0 2px 8px rgba(38,56,47,.08);transition:.13s;}
  .btn:hover{transform:translateY(-1px);} .btn.wide{flex:2;}
  .tools{display:flex;gap:10px;width:100%;max-width:780px;margin-top:16px;justify-content:center;}
  .tools button{background:none;border:none;color:var(--green-soft);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
  .tools button:hover{color:var(--green);}
  @media(max-width:520px){.card{height:280px;}.front .word{font-size:24px;}.front .ipa{font-size:13px;}
    .face{padding:20px 14px;}}
  @media(prefers-reduced-motion:reduce){.inner{transition:none;}}
</style>
</head>
<body>

<header>
  <a class="back" href="../index.html">← 기출 아카이브로</a>
  <div class="kicker">VOCAB · 넘겨보며 외우기</div>
  <h1 id="title">수능 영어 단어장</h1>
</header>

<div class="filters" id="filters"></div>
<div class="filters status-filters" id="statusFilters"></div>

<div class="progress">
  <div class="pbar"><span id="pfill"></span></div>
  <div class="pmeta"><span>외운 단어 <b id="knownN">0</b> / <span id="totalN">0</span></span><span id="pctN">0%</span></div>
</div>

<div id="stage"></div>

<div class="sync-panel" id="syncPanel">
  <h3>🔗 진도 옮기기</h3>
  <p class="sync-desc">폰과 컴퓨터의 진도를 맞출 수 있어요. 한쪽에서 <b>내 코드를 복사</b>해서, 다른 쪽 <b>아래 칸에 붙여넣고 불러오기</b>를 누르세요.</p>

  <div class="sync-block">
    <label>① 내 진도 코드 <span id="myCodeInfo"></span></label>
    <textarea id="myCode" readonly onclick="this.select()"></textarea>
    <button class="sync-btn" onclick="copyMyCode()">📋 복사하기</button>
  </div>

  <div class="sync-block">
    <label>② 다른 기기 코드 붙여넣기</label>
    <textarea id="inCode" placeholder="여기에 코드를 붙여넣으세요"></textarea>
    <button class="sync-btn primary" onclick="applyCode()">📥 불러오기</button>
  </div>

  <div class="sync-msg" id="syncMsg"></div>
  <button class="sync-close" onclick="toggleSync()">닫기</button>
</div>

<script>
/* =====================================================================
   단어 데이터 — 회차 상관없이 여기에 계속 추가하면 됩니다.
   s  = 회차(2018-06 / 2018-09 / 2018-수능 …)
   w  = 단어,  pos = 품사,  m = 뜻,  ex = 예문(<em>단어</em>로 강조)
   ===================================================================== */
const WORDS = [
  { s:"2018-6", w:"come up with", ipa:"/kʌm ʌp wɪð/", pos:"phrase", m:"생각해내다, (해결책·아이디어를) 내놓다", ex:"She <em>came up with</em> a brilliant idea." },
  { s:"2018-6", w:"sip", ipa:"/sɪp/", pos:"v. / n.", m:"홀짝이다, 조금씩 마시다 / 한 모금", ex:"He <em>sipped</em> his coffee slowly." },
  { s:"2018-6", w:"crept", ipa:"/krept/", pos:"v. (creep의 과거)", m:"살금살금 기어갔다, 서서히 다가왔다", ex:"The cat <em>crept</em> toward the bird." },
  { s:"2018-6", w:"flee", ipa:"/fliː/", pos:"v.", m:"달아나다, 도망치다", ex:"The villagers had to <em>flee</em> from the flood." },
  { s:"2018-6", w:"envious", ipa:"/ˈenviəs/", pos:"adj.", m:"부러워하는, 시기하는", ex:"She was <em>envious</em> of his success." },
  { s:"2018-6", w:"jackpot", ipa:"/ˈdʒækpɑːt/", pos:"n.", m:"거액의 상금, 대박", ex:"They hit the <em>jackpot</em> on their first try." },
  { s:"2018-6", w:"hard-wired", ipa:"/ˌhɑːrdˈwaɪərd/", pos:"adj.", m:"타고난, 선천적으로 굳어진; (회로가) 내장된", ex:"Humans seem <em>hard-wired</em> to seek connection." },
  { s:"2018-6", w:"misplace", ipa:"/ˌmɪsˈpleɪs/", pos:"v.", m:"제자리에 두지 않다, 잘못 두어 잃어버리다", ex:"I always <em>misplace</em> my keys." },
  { s:"2018-6", w:"coordinate", ipa:"/koʊˈɔːrdɪneɪt/", pos:"v. / n.", m:"조정하다, 조화롭게 조직하다 / 좌표", ex:"She <em>coordinated</em> the whole team's schedule." },
  { s:"2018-6", w:"competence", ipa:"/ˈkɑːmpɪtəns/", pos:"n.", m:"능력, 역량, 유능함", ex:"He showed great <em>competence</em> in his work." },
  { s:"2018-6", w:"undoubtedly", ipa:"/ʌnˈdaʊtɪdli/", pos:"adv.", m:"의심할 여지 없이, 틀림없이", ex:"She is <em>undoubtedly</em> the best candidate." },
  { s:"2018-6", w:"proactive", ipa:"/ˌproʊˈæktɪv/", pos:"adj.", m:"주도적인, 적극적인, 사전 대응적인", ex:"Be <em>proactive</em> rather than reactive." },
  { s:"2018-6", w:"scrap", ipa:"/skræp/", pos:"v. / n.", m:"폐기하다, 버리다 / 조각, 부스러기", ex:"They decided to <em>scrap</em> the old plan." },
  { s:"2018-6", w:"expenditure", ipa:"/ɪkˈspendɪtʃər/", pos:"n.", m:"지출, 비용, 소비", ex:"Public <em>expenditure</em> on health has increased." },
  { s:"2018-6", w:"antiseptic", ipa:"/ˌæntiˈseptɪk/", pos:"adj. / n.", m:"소독의, 방부의 / 소독제", ex:"She applied <em>antiseptic</em> to the wound." },
  { s:"2018-6", w:"unsuspecting", ipa:"/ˌʌnsəˈspektɪŋ/", pos:"adj.", m:"의심하지 않는, 낌새를 못 채는", ex:"The trap caught the <em>unsuspecting</em> traveler." },
  { s:"2018-6", w:"offspring", ipa:"/ˈɔːfsprɪŋ/", pos:"n.", m:"자식, 새끼, 자손", ex:"Their <em>offspring</em> inherited the same trait." },
  { s:"2018-6", w:"erroneously", ipa:"/ɪˈroʊniəsli/", pos:"adv.", m:"잘못되게, 틀리게", ex:"He was <em>erroneously</em> identified as the suspect." },
  { s:"2018-6", w:"homogeneous", ipa:"/ˌhoʊməˈdʒiːniəs/", pos:"adj.", m:"동질의, 균질의 (같은 종류의)", ex:"The country has a fairly <em>homogeneous</em> population." },
  { s:"2018-6", w:"recommend", ipa:"/ˌrekəˈmend/", pos:"v.", m:"추천하다, 권하다", ex:"I strongly <em>recommend</em> this book." },
  { s:"2018-6", w:"encompass", ipa:"/ɪnˈkʌmpəs/", pos:"v.", m:"포함하다, 아우르다, 둘러싸다", ex:"The course <em>encompasses</em> many different topics." },
  { s:"2018-6", w:"tame", ipa:"/teɪm/", pos:"v. / adj.", m:"길들이다 / 길들여진, 유순한", ex:"It took months to <em>tame</em> the wild horse." },
  { s:"2018-6", w:"liberate", ipa:"/ˈlɪbəreɪt/", pos:"v.", m:"해방하다, 자유롭게 하다, 풀어주다", ex:"The soldiers <em>liberated</em> the city from occupation." },
  { s:"2018-6", w:"still", ipa:"/stɪl/", pos:"adj. (형용사)", m:"고요한, 정지한, 잔잔한 (움직임·소리가 없는)", ex:"The lake was perfectly <em>still</em> at dawn." },
  { s:"2018-6", w:"meld", ipa:"/meld/", pos:"v.", m:"섞이다, 융합하다, 하나로 합치다", ex:"The two styles <em>meld</em> into something new." },
  { s:"2018-6", w:"convergence", ipa:"/kənˈvɜːrdʒəns/", pos:"n.", m:"수렴, 한 점으로 모임, 집중", ex:"We saw a <em>convergence</em> of ideas from both teams." },
  { s:"2018-6", w:"perceptual", ipa:"/pərˈseptʃuəl/", pos:"adj.", m:"지각의, 인지의 (감각으로 받아들이는)", ex:"Optical illusions reveal <em>perceptual</em> limits." },
  { s:"2018-6", w:"cognitive", ipa:"/ˈkɑːɡnətɪv/", pos:"adj.", m:"인지의, 인식의 (사고·이해와 관련된)", ex:"Learning a language boosts <em>cognitive</em> ability." },
  { s:"2018-6", w:"set apart from", ipa:"/set əˈpɑːrt frʌm/", pos:"phrase", m:"~와 구별짓다, ~와 다르게 만들다", ex:"Curiosity <em>sets</em> her <em>apart from</em> the others." },
  { s:"2018-6", w:"in terms of", ipa:"/ɪn tɜːrmz ʌv/", pos:"phrase", m:"~의 관점에서, ~ 단위로", ex:"Think <em>in terms of</em> decades, not days." },
  { s:"2018-6", w:"comprehend", ipa:"/ˌkɑːmprɪˈhend/", pos:"v.", m:"이해하다, 파악하다 (understand의 격식체)", ex:"The scale is hard to <em>comprehend</em>." },
  { s:"2018-6", w:"erosion", ipa:"/ɪˈroʊʒn/", pos:"n.", m:"침식 (topsoil erosion = 표토 침식)", ex:"Heavy rain speeds up soil <em>erosion</em>." },
  { s:"2018-6", w:"assess", ipa:"/əˈses/", pos:"v.", m:"평가하다, 가늠하다", ex:"We must <em>assess</em> the risk carefully." },
  { s:"2018-6", w:"vital to", ipa:"/ˈvaɪtl tuː/", pos:"phrase", m:"~에 필수적인", ex:"Sleep is <em>vital to</em> recovery." },
  { s:"2018-6", w:"suppress", ipa:"/səˈpres/", pos:"v.", m:"억압하다, 억누르다 (명사 suppression)", ex:"You cannot <em>suppress</em> disagreement forever." },
  { s:"2018-6", w:"consultation", ipa:"/ˌkɑːnslˈteɪʃn/", pos:"n.", m:"협의, 자문", ex:"The plan was made after wide <em>consultation</em>." },
  { s:"2018-6", w:"subtle", ipa:"/ˈsʌtl/", pos:"adj.", m:"미묘한, 교묘한 (subtle coercion = 교묘한 강압)", ex:"There was a <em>subtle</em> pressure to agree." },
  { s:"2018-6", w:"coercion", ipa:"/koʊˈɜːrʒn/", pos:"n.", m:"강압, 강제", ex:"Consent given under <em>coercion</em> is not consent." },
  { s:"2018-6", w:"genuine", ipa:"/ˈdʒenjuɪn/", pos:"adj.", m:"진정한, 진짜의", ex:"That is a <em>genuine</em> source of freedom." },
  { s:"2018-6", w:"deliberation", ipa:"/dɪˌlɪbəˈreɪʃn/", pos:"n.", m:"숙의, 심의 (political deliberation)", ex:"The council reached a decision after long <em>deliberation</em>." },
  { s:"2018-6", w:"in that", ipa:"/ɪn ðæt/", pos:"conj.", m:"~라는 점에서 (이유·근거)", ex:"It is unusual <em>in that</em> everyone pays more." },
  { s:"2018-6", w:"reconfigure", ipa:"/ˌriːkənˈfɪɡjər/", pos:"v.", m:"재구성하다, 재배치하다", ex:"The brain can <em>reconfigure</em> old memories." },
  { s:"2018-6", w:"mere", ipa:"/mɪr/", pos:"adj.", m:"단지 ~에 불과한 ('그것만으론 부족하다'는 신호)", ex:"The <em>mere</em> ability to copy is not enough." },

const $ = id => document.getElementById(id);
const known = {
  all(){ try{ return JSON.parse(localStorage.getItem("vocab-known")) || {}; }catch(e){ return {}; } },
  key(wd){ return wd.s+"|"+wd.w; },
  is(wd){ return !!this.all()[this.key(wd)]; },
  set(wd,v){ const a=this.all(); if(v) a[this.key(wd)]=1; else delete a[this.key(wd)]; localStorage.setItem("vocab-known", JSON.stringify(a)); }
};

let filter = "all";
let statusFilter = "all";   // all | todo(안 외운 것) | done(외운 것)
let list = [];
let pos = 0;

// URL로 회차 지정 가능:  vocab.html?s=2018-06
const params = new URLSearchParams(location.search);
if(params.get("s")) filter = params.get("s");

function sessions(){
  const set = [];
  WORDS.forEach(w=>{ if(!set.includes(w.s)) set.push(w.s); });
  return set.sort();
}
function sLabel(s){
  if(s==="all") return "전체";
  const [y,m] = s.split("-");
  return y + " " + (m==="수능"?"수능":m+"월");
}

function buildFilters(){
  const box = $("filters");
  box.innerHTML = "";
  ["all", ...sessions()].forEach(s=>{
    const b = document.createElement("button");
    b.textContent = sLabel(s) + (s==="all" ? ` (${WORDS.length})` : ` (${WORDS.filter(w=>w.s===s).length})`);
    b.className = (s===filter ? "on" : "");
    b.onclick = () => { filter=s; pos=0; refresh(); };
    box.appendChild(b);
  });
}

function buildStatusFilters(){
  const box = $("statusFilters");
  if(!box) return;
  const base = (filter==="all") ? WORDS : WORDS.filter(w=>w.s===filter);
  const doneN = base.filter(w=>known.is(w)).length;
  const todoN = base.length - doneN;
  const defs = [
    ["all",  `전체 (${base.length})`],
    ["todo", `아직 (${todoN})`],
    ["done", `외움 (${doneN})`]
  ];
  box.innerHTML = "";
  defs.forEach(([v,label])=>{
    const b = document.createElement("button");
    b.textContent = label;
    b.className = (v===statusFilter ? "on" + (v==="todo" ? " todo-on" : "") : "");
    b.onclick = () => { statusFilter = v; pos = 0; refresh(); };
    box.appendChild(b);
  });
}

function refresh(){
  let base = (filter==="all") ? WORDS.slice() : WORDS.filter(w=>w.s===filter);
  if(statusFilter==="todo")      list = base.filter(w=>!known.is(w));
  else if(statusFilter==="done") list = base.filter(w=>known.is(w));
  else                           list = base;
  if(pos >= list.length) pos = 0;
  buildFilters();
  buildStatusFilters();
  const sName = (filter==="all") ? "수능 영어 단어장" : sLabel(filter)+" 단어장";
  const sTag  = statusFilter==="todo" ? " · 아직" : statusFilter==="done" ? " · 외움" : "";
  $("title").textContent = sName + sTag;
  drawStage();
}

function drawStage(){
  const stage = $("stage");
  if(list.length===0){
    let msg;
    if(statusFilter==="todo"){
      msg = `<div class="empty-msg"><span class="big">🎉</span>
        이 범위는 <b>다 외웠어요!</b><br>다른 회차를 고르거나 '외움'을 눌러 복습해 보세요.
        <br><button onclick="statusFilter='all';refresh();">전체 보기</button></div>`;
    } else if(statusFilter==="done"){
      msg = `<div class="empty-msg"><span class="big">📖</span>
        아직 <b>외운 표시를 한 단어가 없어요.</b><br>카드에서 '✓ 외웠어요'를 눌러 보세요.
        <br><button onclick="statusFilter='all';refresh();">전체 보기</button></div>`;
    } else {
      msg = `<div class="empty-msg">이 회차에는 아직 단어가 없어요.</div>`;
    }
    stage.innerHTML = msg; updateProgress(); return;
  }
  if(pos>=list.length) pos=0;
  const wd = list[pos];
  stage.innerHTML = `
    <div class="card" id="card" onclick="flip()">
      <div class="inner">
        <div class="face front">
          <div class="sess">${sLabel(wd.s)}</div>
          <div class="known-badge">외움</div>
          <div class="word" id="frontWord">${wd.w}</div>
          ${wd.ipa?`<div class="ipa">${wd.ipa}</div>`:""}
          <div class="pos">${wd.pos}</div>
          <button class="speak" onclick="say(event, '${wd.w.replace(/'/g,"\\'")}')">🔊 발음 듣기</button>
          <div class="hint">카드를 누르면 뜻이 나와요</div>
        </div>
        <div class="face back-face">
          <div class="word-sm">${wd.w}${wd.ipa?`<span class="ipa-sm">${wd.ipa}</span>`:""}</div>
          <button class="speak-sm" onclick="say(event, '${wd.w.replace(/'/g,"\\'")}')">🔊</button>
          <div class="mean">${wd.m}</div>
          <div class="ex">${wd.ex.replace(/<em>/g,'<span class="em">').replace(/<\/em>/g,'</span>')}</div>
        </div>
      </div>
    </div>
    <div class="idx"><b>${pos+1}</b> / ${list.length}</div>
    <div class="mark">
      <button class="know" onclick="mark(true,event)">✓ 외웠어요</button>
      <button class="dunno" onclick="mark(false,event)">✗ 아직요</button>
    </div>
    <div class="nav">
      <button class="btn" onclick="go(-1)">← 이전</button>
      <button class="btn wide" onclick="flip()">뒤집기</button>
      <button class="btn" onclick="go(1)">다음 →</button>
    </div>
    <div class="tools">
      <button onclick="shuffle()">🔀 섞기</button>
      <button onclick="refresh()">↩ 순서대로</button>
      <button onclick="location.href='../../index.html'">🔗 진도 옮기기</button>
      <button onclick="resetProgress()">🗑 진도 초기화</button>
    </div>`;
  const card = $("card");
  card.classList.toggle("is-known", known.is(wd));
  document.querySelector(".mark .know").classList.toggle("on", known.is(wd));
  fitWord();
  updateProgress();
}

/* 긴 단어가 한 줄에 다 들어가도록 폰트 자동 축소 */
function fitWord(){
  const el = document.getElementById("frontWord");
  if(!el) return;
  const face = el.closest(".face");
  const avail = face.clientWidth - 40;      // 좌우 여백
  const isMobile = window.innerWidth <= 520;
  let size = isMobile ? 24 : 40;
  const min  = isMobile ? 11 : 15;
  el.style.fontSize = size + "px";
  while(el.scrollWidth > avail && size > min){
    size -= 1;
    el.style.fontSize = size + "px";
  }
}
window.addEventListener("resize", fitWord);

/* 브라우저 음성합성으로 발음 재생 (무설치·오프라인) */
function say(e, word){
  if(e) e.stopPropagation();
  if(!("speechSynthesis" in window)){ return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.9;
  const btn = e ? e.currentTarget : null;
  if(btn){ btn.classList.add("playing"); u.onend = ()=>btn.classList.remove("playing"); }
  window.speechSynthesis.speak(u);
}

function flip(){ const c=$("card"); if(c) c.classList.toggle("flip"); }
function go(d){ pos=(pos+d+list.length)%list.length; drawStage(); }
function mark(v,e){
  if(e) e.stopPropagation();
  const cur = list[pos];
  known.set(cur, v);
  buildStatusFilters();          // 개수 즉시 갱신
  if(statusFilter !== "all"){
    // '아직'/'외움' 보기 중이면 목록에서 빠지므로 재구성
    const keep = pos;
    refresh();
    pos = (keep < list.length) ? keep : 0;
    drawStage();
  } else {
    drawStage();
    setTimeout(()=>go(1),180);
  }
}
function shuffle(){ for(let k=list.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[list[k],list[j]]=[list[j],list[k]];} pos=0; drawStage(); }
function resetProgress(){ if(confirm("외운 표시를 모두 지울까요? (전체 회차)")){ localStorage.removeItem("vocab-known"); pos=0; refresh(); } }

/* ===== 진도 옮기기 패널 ===== */
function toggleSync(){
  const p = $("syncPanel");
  const opening = p.style.display !== "block";
  p.style.display = opening ? "block" : "none";
  if(opening) fillMyCode();
}

function fillMyCode(){
  const data = known.all();
  const keys = Object.keys(data);
  const ta = $("myCode");
  if(keys.length === 0){
    ta.value = "";
    ta.placeholder = "아직 외운 표시를 한 단어가 없어요.";
    $("myCodeInfo").textContent = "외운 단어 0개";
    return;
  }
  ta.value = btoa(unescape(encodeURIComponent(keys.join("\n"))));
  $("myCodeInfo").textContent = `외운 단어 ${keys.length}개`;
}

function copyMyCode(){
  const ta = $("myCode");
  if(!ta.value){ $("syncMsg").textContent = "복사할 진도가 없어요."; return; }
  ta.select();
  ta.setSelectionRange(0, 999999);   // 모바일 대응
  let ok = false;
  try{ ok = document.execCommand("copy"); }catch(e){}
  if(navigator.clipboard && !ok){
    navigator.clipboard.writeText(ta.value).then(()=>{
      $("syncMsg").textContent = "✓ 복사했어요. 다른 기기에 붙여넣으세요.";
    }).catch(()=>{
      $("syncMsg").textContent = "위 칸을 길게 눌러 직접 복사해 주세요.";
    });
  } else {
    $("syncMsg").textContent = ok ? "✓ 복사했어요. 다른 기기에 붙여넣으세요."
                                  : "위 칸을 길게 눌러 직접 복사해 주세요.";
  }
}

function applyCode(){
  const code = $("inCode").value.trim();
  const msg = $("syncMsg");
  if(!code){ msg.textContent = "코드를 붙여넣어 주세요."; return; }
  try{
    const keys = decodeURIComponent(escape(atob(code))).split("\n").filter(Boolean);
    if(keys.length === 0) throw new Error("empty");
    const cur = known.all();
    let added = 0;
    keys.forEach(k => { if(!cur[k]){ cur[k] = 1; added++; } });
    localStorage.setItem("vocab-known", JSON.stringify(cur));
    $("inCode").value = "";
    pos = 0; refresh();
    fillMyCode();
    msg.textContent = `✓ 불러왔어요. 새로 ${added}개 추가 (전체 ${Object.keys(cur).length}개)`;
  }catch(e){
    msg.textContent = "✗ 코드를 읽을 수 없어요. 전체를 다시 붙여넣어 주세요.";
  }
}

function updateProgress(){
  const total = list.length;
  const cnt = list.filter(w=>known.is(w)).length;
  $("knownN").textContent = cnt;
  $("totalN").textContent = total;
  const pct = total ? Math.round(cnt/total*100) : 0;
  $("pctN").textContent = pct+"%";
  $("pfill").style.width = pct+"%";
}

document.addEventListener("keydown", e=>{
  if(!list.length) return;
  if(e.code==="Space"){ e.preventDefault(); flip(); }
  else if(e.code==="ArrowRight") go(1);
  else if(e.code==="ArrowLeft") go(-1);
  else if(e.key==="1") mark(true);
  else if(e.key==="2") mark(false);
});

refresh();
</script>
